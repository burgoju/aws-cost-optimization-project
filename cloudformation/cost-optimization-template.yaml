AWSTemplateFormatVersion: '2010-09-09'
Description: Cost Optimization Resources

Resources:
  # Budget
  CostBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetLimit:
          Amount: 10
          Unit: USD
        BudgetName: Monthly-Spending-Limit
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            NotificationType: ACTUAL
          Subscribers:
            - Address: your-email@example.com
              SubscriptionType: EMAIL

  # CloudWatch Alarm
  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: High-CPU-Utilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmTopic

  # SNS Topic
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Cost-Optimization-Alerts
      Subscription:
        - Endpoint: your-email@example.com
          Protocol: email
